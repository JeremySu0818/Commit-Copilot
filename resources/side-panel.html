<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commit Copilot</title>
  <style>
    body { 
      font-family: var(--vscode-font-family); 
      padding: 12px; 
      margin: 0;
    }
    .container { 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
    }
    .input-group { 
      display: flex; 
      flex-direction: column; 
      gap: 6px; 
    }
    label { 
      font-weight: 600; 
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--vscode-foreground);
      opacity: 0.8;
    }
    input[type="password"],
    input[type="text"] { 
      padding: 8px 10px; 
      background: var(--vscode-input-background); 
      color: var(--vscode-input-foreground); 
      border: 1px solid var(--vscode-input-border);
      border-radius: 4px;
      font-size: 13px;
    }
    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--vscode-focusBorder);
    }
    button { 
      padding: 10px 14px; 
      background: var(--vscode-button-background); 
      color: var(--vscode-button-foreground); 
      border: none; 
      cursor: pointer;
      border-radius: 4px;
      font-weight: 500;
      font-size: 13px;
      transition: background 0.15s ease;
    }
    button:hover { 
      background: var(--vscode-button-hoverBackground); 
    }
    button:disabled, select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.primary {
      background: var(--vscode-button-background);
    }
    button.primary:hover:not(:disabled) {
      background: var(--vscode-button-hoverBackground);
    }
    button.secondary {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }
    select {
      padding: 8px 10px;
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: var(--vscode-focusBorder);
    }
    .status { 
      font-size: 11px; 
      color: var(--vscode-descriptionForeground); 
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.success {
      background: var(--vscode-testing-iconPassed);
    }
    .status-dot.error {
      background: var(--vscode-testing-iconFailed);
    }
    .status-dot.warning {
      background: var(--vscode-testing-iconQueued);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--vscode-foreground);
      margin-bottom: 4px;
    }
    .config-section {
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-widget-border);
      border-radius: 6px;
      padding: 12px;
    }
    .provider-info {
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
      margin-top: 8px;
      line-height: 1.5;
    }
    .provider-info a {
      color: var(--vscode-textLink-foreground);
      text-decoration: none;
    }
    .provider-info a:hover {
      text-decoration: underline;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: var(--vscode-foreground);
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] {
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="config-section">
      <div class="section-title"> API Provider</div>
      <div class="input-group" style="margin-top: 10px;">
        <label>Provider</label>
        <select id="providerSelect">
          <option value="" disabled>Select a provider...</option>
        </select>
      </div>
    </div>
    <div class="config-section">
      <div class="section-title" id="configTitle"> Configuration</div>
      <div class="input-group" style="margin-top: 10px;">
        <label id="apiKeyLabel">API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your API Key">
        <button id="saveBtn" disabled>Save</button>
        <span id="keyStatus" class="status">
          <span class="status-dot warning"></span>
          Checking status...
        </span>
      </div>
      <div class="provider-info" id="providerInfo"></div>
    </div>
    <div class="config-section">
      <div class="section-title"> Model</div>
      <div class="input-group" style="margin-top: 10px;">
        <label>Model</label>
        <select id="modelSelect" disabled>
          <option value="" disabled selected>Select a model...</option>
        </select>
      </div>
    </div>
    <div class="config-section">
      <div class="section-title"> Generate Configuration</div>
      <div class="input-group" style="margin-top: 10px;">
        <label>Mode</label>
        <select id="generateModeSelect">
          <option value="" disabled selected>Select generate mode...</option>
        </select>
        <span id="generateModeStatus" class="status">
          Loading configuration...
        </span>
      </div>
      <div class="input-group" style="margin-top: 10px;">
        <label>Conventional Commit Sections</label>
        <div class="checkbox-group">
          <label class="checkbox-item" for="includeScopeCheckbox">
            <input type="checkbox" id="includeScopeCheckbox">
            Include Scope
          </label>
          <label class="checkbox-item" for="includeBodyCheckbox">
            <input type="checkbox" id="includeBodyCheckbox">
            Include Body
          </label>
          <label class="checkbox-item" for="includeFooterCheckbox">
            <input type="checkbox" id="includeFooterCheckbox">
            Include Footer
          </label>
        </div>
      </div>
    </div>
    <div class="input-group">
      <button id="generateBtn" class="primary" disabled>
         Generate Commit Message
      </button>
    </div>
  </div>
  <script nonce="{{NONCE}}">
    const vscode = acquireVsCodeApi();
    const providers = {{PROVIDERS_JSON}};
    const generateModes = {{GENERATE_MODES_JSON}};
    const modelsByProvider = {{MODELS_JSON}};
    const defaultModels = {{DEFAULT_MODELS_JSON}};
    const defaultProvider = {{DEFAULT_PROVIDER_JSON}};
    const defaultGenerateMode = {{DEFAULT_GENERATE_MODE_JSON}};
    const defaultCommitOutputOptions = {{DEFAULT_COMMIT_OUTPUT_OPTIONS_JSON}};
    const ollamaDefaultHost = {{OLLAMA_DEFAULT_HOST_JSON}};
    const providerSelect = document.getElementById('providerSelect');
    const saveBtn = document.getElementById('saveBtn');
    const generateBtn = document.getElementById('generateBtn');
    const generateModeSelect = document.getElementById('generateModeSelect');
    const generateModeStatus = document.getElementById('generateModeStatus');
    const apiKeyInput = document.getElementById('apiKey');
    const apiKeyLabel = document.getElementById('apiKeyLabel');
    const keyStatus = document.getElementById('keyStatus');
    const modelSelect = document.getElementById('modelSelect');
    const providerInfo = document.getElementById('providerInfo');
    const configTitle = document.getElementById('configTitle');
    const includeScopeCheckbox = document.getElementById('includeScopeCheckbox');
    const includeBodyCheckbox = document.getElementById('includeBodyCheckbox');
    const includeFooterCheckbox = document.getElementById('includeFooterCheckbox');

    let isGenerating = false;
    let hasChanges = false;
    let currentProvider = defaultProvider;
    let currentGenerateMode = defaultGenerateMode;
    let preferredGenerateMode = defaultGenerateMode;
    let currentCommitOutputOptions = normalizeCommitOutputOptions(defaultCommitOutputOptions);
    let keyStatuses = {};

    Object.entries(providers).forEach(([value, label]) => {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = label;
      providerSelect.appendChild(option);
    });

    Object.entries(generateModes).forEach(([value, label]) => {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = label;
      generateModeSelect.appendChild(option);
    });

    function normalizeGenerateMode(mode) {
      return mode === 'direct-diff' ? 'direct-diff' : 'agentic';
    }

    function normalizeCommitOutputOptions(options) {
      const candidate = options && typeof options === 'object' ? options : {};
      return {
        includeScope:
          typeof candidate.includeScope === 'boolean'
            ? candidate.includeScope
            : !!defaultCommitOutputOptions.includeScope,
        includeBody:
          typeof candidate.includeBody === 'boolean'
            ? candidate.includeBody
            : !!defaultCommitOutputOptions.includeBody,
        includeFooter:
          typeof candidate.includeFooter === 'boolean'
            ? candidate.includeFooter
            : !!defaultCommitOutputOptions.includeFooter,
      };
    }

    function updateCommitOutputOptionsUI(options) {
      const normalized = normalizeCommitOutputOptions(options);
      currentCommitOutputOptions = normalized;
      includeScopeCheckbox.checked = normalized.includeScope;
      includeBodyCheckbox.checked = normalized.includeBody;
      includeFooterCheckbox.checked = normalized.includeFooter;
    }

    function saveCommitOutputOptions() {
      const options = {
        includeScope: includeScopeCheckbox.checked,
        includeBody: includeBodyCheckbox.checked,
        includeFooter: includeFooterCheckbox.checked,
      };
      updateCommitOutputOptionsUI(options);
      vscode.postMessage({ type: 'saveCommitOutputOptions', value: currentCommitOutputOptions });
    }

    function updateGenerateModeStatus(mode) {
      if (currentProvider === 'ollama') {
        generateModeStatus.textContent = 'Ollama is fixed to Direct Diff mode';
        return;
      }
      if (mode === 'agentic') {
        generateModeStatus.textContent = 'Agentic mode uses repository tools for deeper analysis';
      } else {
        generateModeStatus.textContent = 'Direct Diff sends the raw diff directly to the model';
      }
    }

    function updateGenerateModeUI(provider) {
      if (provider === 'ollama') {
        currentGenerateMode = 'direct-diff';
        generateModeSelect.value = 'direct-diff';
        generateModeSelect.disabled = true;
        updateGenerateModeStatus('direct-diff');
        return;
      }

      const mode = normalizeGenerateMode(preferredGenerateMode || defaultGenerateMode);
      currentGenerateMode = mode;
      generateModeSelect.value = mode;
      generateModeSelect.disabled = false;
      updateGenerateModeStatus(mode);
    }

    function updateProviderUI(provider) {
      currentProvider = provider;
      providerSelect.value = provider;
      if (provider === 'ollama') {
        apiKeyLabel.textContent = 'Ollama Host URL';
        apiKeyInput.placeholder = ollamaDefaultHost;
        apiKeyInput.value = ollamaDefaultHost;
        apiKeyInput.type = 'text';
        configTitle.textContent = ' Ollama Configuration';
        providerInfo.innerHTML = `
          <strong>Ollama</strong> runs locally on your machine.<br>
          Default host: <code>${ollamaDefaultHost}</code><br>
          Make sure Ollama is running before generating.
        `;
      } else {
        apiKeyLabel.textContent = 'API Key';
        apiKeyInput.value = '';
        apiKeyInput.type = 'password';
        configTitle.textContent = ' API Configuration';
        if (provider === 'google') {
          apiKeyInput.placeholder = 'Enter your Gemini API Key';
          providerInfo.innerHTML = `
            Get your API key from <strong>Google AI Studio</strong>:<br>
            <a href="https://aistudio.google.com/app/apikey" style="color: var(--vscode-textLink-foreground);">aistudio.google.com</a>
          `;
        } else if (provider === 'openai') {
          apiKeyInput.placeholder = 'Enter your OpenAI API Key';
          providerInfo.innerHTML = `
            Get your API key from <strong>OpenAI Platform</strong>:<br>
            <a href="https://platform.openai.com/api-keys" style="color: var(--vscode-textLink-foreground);">platform.openai.com</a>
          `;
        } else if (provider === 'anthropic') {
          apiKeyInput.placeholder = 'Enter your Anthropic API Key';
          providerInfo.innerHTML = `
            Get your API key from <strong>Anthropic Console</strong>:<br>
            <a href="https://platform.claude.com/settings/keys" style="color: var(--vscode-textLink-foreground);">platform.claude.com</a>
          `;
        }
      }
      updateGenerateModeUI(provider);
      vscode.postMessage({ type: 'checkKey', provider });
      vscode.postMessage({ type: 'getModels', provider });
    }

    function updateGenerateBtn() {
      if (isGenerating) {
        generateBtn.disabled = false;
        generateBtn.textContent = ' Cancel Generating';
        generateBtn.title = 'Cancel current generation';
      } else if (!hasChanges) {
        generateBtn.disabled = true;
        generateBtn.textContent = ' Generate Commit Message';
        generateBtn.title = 'No changes detected';
      } else {
        generateBtn.disabled = false;
        generateBtn.textContent = ' Generate Commit Message';
        generateBtn.title = '';
      }
    }

    function updateKeyStatus(hasKey, provider) {
      const statusDot = keyStatus.querySelector('.status-dot');
      if (hasKey) {
        statusDot.className = 'status-dot success';
        keyStatus.innerHTML = '<span class="status-dot success"></span>Configured ';
        modelSelect.disabled = false;
      } else {
        statusDot.className = 'status-dot error';
        keyStatus.innerHTML = '<span class="status-dot error"></span>Not configured';
        if (provider !== 'ollama') {
          modelSelect.disabled = true;
        }
      }
    }

    updateCommitOutputOptionsUI(defaultCommitOutputOptions);

    vscode.postMessage({ type: 'getProvider' });
    vscode.postMessage({ type: 'getGenerateMode' });
    vscode.postMessage({ type: 'getCommitOutputOptions' });
    vscode.postMessage({ type: 'checkGit' });
    vscode.postMessage({ type: 'getAllKeys' });
    vscode.postMessage({ type: 'checkGenerationStatus' });
    vscode.postMessage({ type: 'checkValidationStatus' });

    providerSelect.addEventListener('change', () => {
      const provider = providerSelect.value;
      updateProviderUI(provider);
      vscode.postMessage({ type: 'saveProvider', value: provider });
      saveBtn.disabled = provider !== 'ollama';
    });

    apiKeyInput.addEventListener('input', () => {
      if (currentProvider === 'ollama') {
        saveBtn.disabled = false; 
      } else {
        saveBtn.disabled = !apiKeyInput.value.trim();
      }
    });

    saveBtn.addEventListener('click', () => {
      const key = apiKeyInput.value || (currentProvider === 'ollama' ? ollamaDefaultHost : '');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Validating...';
      keyStatus.innerHTML = '<span class="status-dot warning"></span>Validating...';
      vscode.postMessage({ type: 'saveKey', value: key, provider: currentProvider });
    });

    generateBtn.addEventListener('click', () => {
      if (isGenerating) {
        vscode.postMessage({ type: 'cancelGenerate' });
        return;
      }
      isGenerating = true;
      updateGenerateBtn();
      vscode.postMessage({
        type: 'generate',
        generateMode: currentGenerateMode,
        commitOutputOptions: currentCommitOutputOptions,
      });
    });

    modelSelect.addEventListener('change', () => {
      vscode.postMessage({ type: 'saveModel', value: modelSelect.value, provider: currentProvider });
    });

    generateModeSelect.addEventListener('change', () => {
      if (currentProvider === 'ollama') {
        return;
      }
      const mode = normalizeGenerateMode(generateModeSelect.value);
      preferredGenerateMode = mode;
      currentGenerateMode = mode;
      updateGenerateModeStatus(mode);
      vscode.postMessage({ type: 'saveGenerateMode', value: mode });
    });

    includeScopeCheckbox.addEventListener('change', saveCommitOutputOptions);
    includeBodyCheckbox.addEventListener('change', saveCommitOutputOptions);
    includeFooterCheckbox.addEventListener('change', saveCommitOutputOptions);

    window.addEventListener('message', event => {
      const message = event.data;
      switch (message.type) {
        case 'currentProvider':
          updateProviderUI(message.provider);
          break;
        case 'repoUpdate':
          hasChanges = message.hasChanges;
          updateGenerateBtn();
          break;
        case 'keyStatus':
          updateKeyStatus(message.hasKey, message.provider);
          break;
        case 'allKeyStatuses':
          keyStatuses = message.statuses;
          break;
        case 'currentGenerateMode':
          preferredGenerateMode = normalizeGenerateMode(message.generateMode);
          updateGenerateModeUI(currentProvider);
          break;
        case 'currentCommitOutputOptions':
          updateCommitOutputOptionsUI(message.commitOutputOptions);
          break;
        case 'modelsList':
          populateModels(message.models, message.currentModel);
          break;
        case 'validating':
          saveBtn.disabled = true;
          saveBtn.textContent = 'Validating...';
          keyStatus.innerHTML = '<span class="status-dot warning"></span>Validating...';
          break;
        case 'validationResult':
          if (message.success) {
            keyStatus.innerHTML = '<span class="status-dot success"></span>Saved ';
            if (currentProvider !== 'ollama') {
              apiKeyInput.value = '';
            }
            saveBtn.disabled = currentProvider !== 'ollama';
            saveBtn.textContent = 'Save';
            if (message.models) {
              populateModels(message.models);
            }
            modelSelect.disabled = false;
          } else {
            keyStatus.innerHTML = '<span class="status-dot error"></span>' + (message.error || 'Validation failed');
            saveBtn.disabled = currentProvider === 'ollama' ? false : !apiKeyInput.value.trim();
            saveBtn.textContent = 'Save';
          }
          break;
        case 'generationDone':
          isGenerating = false;
          updateGenerateBtn();
          break;
        case 'generationStatusUpdate':
          isGenerating = message.isGenerating;
          updateGenerateBtn();
          break;
        case 'validationStatusUpdate':
          if (message.isValidating && message.provider === currentProvider) {
            saveBtn.disabled = true;
            saveBtn.textContent = 'Validating...';
            keyStatus.innerHTML = '<span class="status-dot warning"></span>Validating...';
          }
          break;
      }
    });

    function populateModels(models, currentModel) {
      modelSelect.innerHTML = '';
      let foundCurrent = false;
      models.forEach(model => {
        const option = document.createElement('option');
        option.value = model.id;
        option.textContent = model.alias;
        if (model.id === currentModel) {
          option.selected = true;
          foundCurrent = true;
        }
        modelSelect.appendChild(option);
      });
      modelSelect.disabled = false;
      if (!foundCurrent && models.length > 0) {
        const preferredDefaultId = defaultModels[currentProvider];
        const preferred = models.find(m => m.id === preferredDefaultId) || models[0];
        modelSelect.value = preferred.id;
        vscode.postMessage({ type: 'saveModel', value: preferred.id, provider: currentProvider });
      }
    }
  </script>
</body>
</html>
