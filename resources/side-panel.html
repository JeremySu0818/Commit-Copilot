<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commit Copilot</title>
    <style>
      body {
        font-family: var(--vscode-font-family);
        padding: 12px;
        margin: 0;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .hidden {
        display: none;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--vscode-foreground);
        opacity: 0.8;
      }
      input[type='password'],
      input[type='text'],
      input[type='number'] {
        padding: 8px 10px;
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
        border: 1px solid var(--vscode-input-border);
        border-radius: 4px;
        font-size: 13px;
      }
      input[type='password']:focus,
      input[type='text']:focus,
      input[type='number']:focus {
        outline: none;
        border-color: var(--vscode-focusBorder);
      }
      button {
        padding: 10px 14px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        cursor: pointer;
        border-radius: 4px;
        font-weight: 500;
        font-size: 13px;
        transition: background 0.15s ease;
      }
      button:hover {
        background: var(--vscode-button-hoverBackground);
      }
      button:disabled,
      select:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.secondary {
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
      }
      select {
        padding: 8px 10px;
        background: var(--vscode-dropdown-background);
        color: var(--vscode-dropdown-foreground);
        border: 1px solid var(--vscode-dropdown-border);
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      select:focus {
        outline: none;
        border-color: var(--vscode-focusBorder);
      }
      .status {
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-dot.success {
        background: var(--vscode-testing-iconPassed);
      }
      .status-dot.error {
        background: var(--vscode-testing-iconFailed);
      }
      .status-dot.warning {
        background: var(--vscode-testing-iconQueued);
      }
      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--vscode-foreground);
        margin-bottom: 4px;
      }
      .config-section {
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: 6px;
        padding: 12px;
      }
      .provider-info {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        margin-top: 8px;
        line-height: 1.5;
      }
      .provider-info a {
        color: var(--vscode-textLink-foreground);
        text-decoration: none;
      }
      .provider-info a:hover {
        text-decoration: underline;
      }
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 4px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 500;
        text-transform: none;
        letter-spacing: 0;
        color: var(--vscode-foreground);
        cursor: pointer;
      }
      .checkbox-item input[type='checkbox'] {
        margin: 0;
      }
      .settings-header {
        display: flex;
        justify-content: flex-start;
      }
      button.icon-btn {
        background: transparent;
        border: none;
        padding: 4px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        color: var(--vscode-foreground);
        cursor: pointer;
      }
      button.icon-btn:hover {
        background: var(--vscode-toolbar-hoverBackground);
      }
    </style>
  </head>
  <body>
    <div id="mainView" class="container">
      <div class="config-section">
        <div class="section-title" id="apiProviderSectionTitle"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="providerLabel"></label>
          <select id="providerSelect"></select>
        </div>
      </div>
      <div class="config-section">
        <div class="section-title" id="configTitle"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="apiKeyLabel"></label>
          <input type="password" id="apiKey" />
          <button id="saveBtn" disabled></button>
          <span id="keyStatus" class="status"></span>
        </div>
        <div class="provider-info" id="providerInfo"></div>
        <div style="margin-top: 8px">
          <button id="editProviderBtn" class="secondary hidden"></button>
        </div>
      </div>
      <div class="config-section">
        <div class="section-title" id="modelSectionTitle"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="modelLabel"></label>
          <select id="modelSelect" disabled></select>
        </div>
      </div>
      <div class="config-section">
        <div class="section-title" id="generateSectionTitle"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="modeLabel"></label>
          <select id="generateModeSelect"></select>
          <span id="generateModeStatus" class="status"></span>
        </div>
        <div class="input-group" style="margin-top: 10px">
          <label id="commitSectionsLabel"></label>
          <div class="checkbox-group">
            <label class="checkbox-item" for="includeScopeCheckbox">
              <input type="checkbox" id="includeScopeCheckbox" />
              <span id="includeScopeLabel"></span>
            </label>
            <label class="checkbox-item" for="includeBodyCheckbox">
              <input type="checkbox" id="includeBodyCheckbox" />
              <span id="includeBodyLabel"></span>
            </label>
            <label class="checkbox-item" for="includeFooterCheckbox">
              <input type="checkbox" id="includeFooterCheckbox" />
              <span id="includeFooterLabel"></span>
            </label>
          </div>
        </div>
      </div>
      <div class="input-group">
        <button id="generateBtn" disabled></button>
      </div>
    </div>

    <div id="settingsView" class="container hidden">
      <div class="settings-header">
        <button id="backBtn" class="icon-btn" title="">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M7 3.093L1.093 9 7 14.907l.707-.707-4.7-4.7H14v-1H3.007l4.7-4.7L7 3.093z"
            />
          </svg>
        </button>
      </div>
      <div class="config-section">
        <div class="section-title" id="settingsSectionTitle"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="languageLabel"></label>
          <select id="languageSelect"></select>
          <span id="languageStatus" class="status"></span>
        </div>
        <div class="input-group" style="margin-top: 10px">
          <label id="maxAgentStepsLabel"></label>
          <input
            type="text"
            id="maxAgentStepsInput"
            inputmode="numeric"
            pattern="[0-9]*"
          />
          <button id="saveMaxAgentStepsBtn" disabled></button>
          <span id="maxAgentStepsStatus" class="status"></span>
        </div>
      </div>
    </div>

    <div id="addProviderView" class="container hidden">
      <div class="settings-header">
        <button id="addProviderBackBtn" class="icon-btn" title="">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M7 3.093L1.093 9 7 14.907l.707-.707-4.7-4.7H14v-1H3.007l4.7-4.7L7 3.093z"
            />
          </svg>
        </button>
      </div>
      <div class="config-section">
        <div class="section-title" id="addProviderSectionTitle"></div>
        <div class="provider-info" id="addProviderInfo"></div>
        <div class="input-group" style="margin-top: 10px">
          <label id="providerNameLabel"></label>
          <input type="text" id="providerNameInput" />
        </div>
        <div class="input-group" style="margin-top: 10px">
          <label id="apiBaseUrlLabel"></label>
          <input type="text" id="apiBaseUrlInput" />
        </div>
        <div
          class="input-group"
          id="customApiKeyGroup"
          style="margin-top: 10px"
        >
          <label id="customApiKeyLabel"></label>
          <input type="password" id="customApiKeyInput" />
        </div>
        <span id="addProviderStatus" class="status"></span>
        <div style="margin-top: 12px; display: flex; gap: 8px">
          <button id="saveProviderBtn" disabled></button>
          <button id="deleteProviderBtn" class="secondary hidden"></button>
        </div>
      </div>
    </div>

    <script nonce="{{NONCE}}">
      const vscode = acquireVsCodeApi();
      const providers = {{PROVIDERS_JSON}};
      const generateModes = {{GENERATE_MODES_JSON}};
      const modelsByProvider = {{MODELS_JSON}};
      const defaultModels = {{DEFAULT_MODELS_JSON}};
      const defaultProvider = {{DEFAULT_PROVIDER_JSON}};
      const defaultGenerateMode = {{DEFAULT_GENERATE_MODE_JSON}};
      const defaultCommitOutputOptions = {{DEFAULT_COMMIT_OUTPUT_OPTIONS_JSON}};
      const ollamaDefaultHost = {{OLLAMA_DEFAULT_HOST_JSON}};
      const languagePacks = {{WEBVIEW_LANGUAGE_PACKS_JSON}};
      const initialDisplayLanguage = {{DISPLAY_LANGUAGE_JSON}};
      const initialEffectiveLanguage = {{EFFECTIVE_LANGUAGE_JSON}};
      const initialVSCodeLanguage = {{VSCODE_LANGUAGE_JSON}};
      const displayLanguageOptions = {{DISPLAY_LANGUAGE_OPTIONS_JSON}};
      const initialScreen = {{INITIAL_SCREEN_JSON}};
      const customProviderPrefix = {{CUSTOM_PROVIDER_PREFIX_JSON}};
      let customProviders = {{CUSTOM_PROVIDERS_JSON}};

      const mainView = document.getElementById('mainView');
      const settingsView = document.getElementById('settingsView');
      const addProviderView = document.getElementById('addProviderView');
      const providerSelect = document.getElementById('providerSelect');
      const saveBtn = document.getElementById('saveBtn');
      const generateBtn = document.getElementById('generateBtn');
      const generateModeSelect = document.getElementById('generateModeSelect');
      const generateModeStatus = document.getElementById('generateModeStatus');
      const apiKeyInput = document.getElementById('apiKey');
      const apiKeyLabel = document.getElementById('apiKeyLabel');
      const keyStatus = document.getElementById('keyStatus');
      const modelSelect = document.getElementById('modelSelect');
      const providerInfo = document.getElementById('providerInfo');
      const editProviderBtn = document.getElementById('editProviderBtn');
      const configTitle = document.getElementById('configTitle');
      const includeScopeCheckbox = document.getElementById('includeScopeCheckbox');
      const includeBodyCheckbox = document.getElementById('includeBodyCheckbox');
      const includeFooterCheckbox = document.getElementById('includeFooterCheckbox');
      const backBtn = document.getElementById('backBtn');
      const languageSelect = document.getElementById('languageSelect');
      const languageStatus = document.getElementById('languageStatus');
      const maxAgentStepsInput = document.getElementById('maxAgentStepsInput');
      const maxAgentStepsStatus = document.getElementById('maxAgentStepsStatus');
      const saveMaxAgentStepsBtn = document.getElementById('saveMaxAgentStepsBtn');
      const addProviderBackBtn = document.getElementById('addProviderBackBtn');
      const addProviderSectionTitle = document.getElementById('addProviderSectionTitle');
      const addProviderInfo = document.getElementById('addProviderInfo');
      const providerNameLabel = document.getElementById('providerNameLabel');
      const providerNameInput = document.getElementById('providerNameInput');
      const apiBaseUrlLabel = document.getElementById('apiBaseUrlLabel');
      const apiBaseUrlInput = document.getElementById('apiBaseUrlInput');
      const customApiKeyLabel = document.getElementById('customApiKeyLabel');
      const customApiKeyInput = document.getElementById('customApiKeyInput');
      const addProviderStatus = document.getElementById('addProviderStatus');
      const saveProviderBtn = document.getElementById('saveProviderBtn');
      const deleteProviderBtn = document.getElementById('deleteProviderBtn');

      const apiProviderSectionTitle = document.getElementById('apiProviderSectionTitle');
      const providerLabel = document.getElementById('providerLabel');
      const modelSectionTitle = document.getElementById('modelSectionTitle');
      const modelLabel = document.getElementById('modelLabel');
      const generateSectionTitle = document.getElementById('generateSectionTitle');
      const modeLabel = document.getElementById('modeLabel');
      const commitSectionsLabel = document.getElementById('commitSectionsLabel');
      const includeScopeLabel = document.getElementById('includeScopeLabel');
      const includeBodyLabel = document.getElementById('includeBodyLabel');
      const includeFooterLabel = document.getElementById('includeFooterLabel');
      const settingsSectionTitle = document.getElementById('settingsSectionTitle');
      const languageLabel = document.getElementById('languageLabel');

      let isGenerating = false;
      let pendingStatusCheck = true;
      let hasChanges = false;
      let currentProvider = defaultProvider;
      let currentGenerateMode = defaultGenerateMode;
      let preferredGenerateMode = defaultGenerateMode;
      let currentCommitOutputOptions = normalizeCommitOutputOptions(defaultCommitOutputOptions);
      let vscodeLanguage = typeof initialVSCodeLanguage === 'string' ? initialVSCodeLanguage : '';
      let displayLanguage = initialDisplayLanguage;
      let effectiveLanguage = initialEffectiveLanguage;
      let currentPack = languagePacks[effectiveLanguage] || languagePacks.en;
      let currentMaxAgentSteps = 0;
      let editingCustomProviderId = null;
      let editingOriginalName = '';
      let editingOriginalBaseUrl = '';
      let providerKeyStatuses = {};
      let ollamaStoredHost = ollamaDefaultHost;
      let currentAllowCustomModel = false;

      function normalizeGenerateMode(mode) {
        return mode === 'direct-diff' ? 'direct-diff' : 'agentic';
      }

      function normalizeCommitOutputOptions(options) {
        const candidate = options && typeof options === 'object' ? options : {};
        return {
          includeScope:
            typeof candidate.includeScope === 'boolean'
              ? candidate.includeScope
              : !!defaultCommitOutputOptions.includeScope,
          includeBody:
            typeof candidate.includeBody === 'boolean'
              ? candidate.includeBody
              : !!defaultCommitOutputOptions.includeBody,
          includeFooter:
            typeof candidate.includeFooter === 'boolean'
              ? candidate.includeFooter
              : !!defaultCommitOutputOptions.includeFooter,
        };
      }

      function normalizeMaxAgentStepsValue(value) {
        const raw = String(value || '').trim();
        if (!raw || !/^\d+$/.test(raw)) {
          return 0;
        }
        const parsed = Number.parseInt(raw, 10);
        if (!Number.isSafeInteger(parsed) || parsed <= 0) {
          return 0;
        }
        return parsed;
      }

      function normalizeOllamaHostValue(value) {
        const raw = typeof value === 'string' ? value.trim() : '';
        return raw || ollamaDefaultHost;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderCustomProviderInfo(cp) {
        return '';
      }

      function updateMaxAgentStepsSaveBtn() {
        const value = normalizeMaxAgentStepsValue(maxAgentStepsInput.value);
        saveMaxAgentStepsBtn.disabled = value === currentMaxAgentSteps;
      }

      function fillTemplate(template, values) {
        return String(template).replace(/\{([a-zA-Z0-9_]+)\}/g, (_, key) => {
          return values[key] ?? '';
        });
      }

      function renderStatus(target, type, text) {
        target.innerHTML = '<span class="status-dot ' + type + '"></span>' + escapeHtml(text);
      }

      function renderProviderSelect() {
        const selected = currentProvider;
        providerSelect.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.textContent = currentPack.placeholders.selectProvider;
        providerSelect.appendChild(placeholder);
        Object.entries(providers).forEach(([value, label]) => {
          const option = document.createElement('option');
          option.value = value;
          option.textContent = label;
          providerSelect.appendChild(option);
        });
        if (customProviders && customProviders.length > 0) {
          customProviders.forEach((cp) => {
            const option = document.createElement('option');
            option.value = customProviderPrefix + cp.id;
            option.textContent = cp.name;
            providerSelect.appendChild(option);
          });
        }
        const addOption = document.createElement('option');
        addOption.value = '__add_provider__';
        addOption.textContent = currentPack.buttons.addProvider;
        providerSelect.appendChild(addOption);
        providerSelect.value = selected;
        if (!providerSelect.value) {
          providerSelect.selectedIndex = 0;
        }
      }

      function getGenerateModeLabel(mode) {
        if (mode === 'agentic') {
          return currentPack.options.agentic || generateModes[mode];
        }
        if (mode === 'direct-diff') {
          return currentPack.options.directDiff || generateModes[mode];
        }
        return generateModes[mode] || mode;
      }

      function renderGenerateModeSelect() {
        const selected = normalizeGenerateMode(currentGenerateMode);
        generateModeSelect.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.textContent = currentPack.placeholders.selectGenerateMode;
        generateModeSelect.appendChild(placeholder);
        Object.keys(generateModes).forEach((mode) => {
          const option = document.createElement('option');
          option.value = mode;
          option.textContent = getGenerateModeLabel(mode);
          generateModeSelect.appendChild(option);
        });
        generateModeSelect.value = selected;
      }

      function renderLanguageOptions() {
        languageSelect.innerHTML = '';
        displayLanguageOptions.forEach((option) => {
          const entry = document.createElement('option');
          entry.value = option.value;
          entry.textContent = (option.labels && option.labels[effectiveLanguage]) || option.value;
          languageSelect.appendChild(entry);
        });
        languageSelect.value = displayLanguage;
      }

      function renderStaticText() {
        apiProviderSectionTitle.textContent = currentPack.sections.apiProvider;
        providerLabel.textContent = currentPack.labels.provider;
        modelSectionTitle.textContent = currentPack.sections.model;
        modelLabel.textContent = currentPack.labels.model;
        generateSectionTitle.textContent = currentPack.sections.generateConfiguration;
        modeLabel.textContent = currentPack.labels.mode;
        commitSectionsLabel.textContent = currentPack.labels.conventionalCommitSections;
        includeScopeLabel.textContent = currentPack.labels.includeScope;
        includeBodyLabel.textContent = currentPack.labels.includeBody;
        includeFooterLabel.textContent = currentPack.labels.includeFooter;
        settingsSectionTitle.textContent = currentPack.sections.settings;
        languageLabel.textContent = currentPack.labels.language;
        maxAgentStepsLabel.textContent = currentPack.labels.maxAgentSteps;
        maxAgentStepsStatus.textContent = currentPack.descriptions.maxAgentStepsDescription;
        saveMaxAgentStepsBtn.textContent = currentPack.buttons.save;
        backBtn.title = currentPack.buttons.back;
        saveBtn.textContent = currentPack.buttons.save;
        editProviderBtn.textContent = currentPack.buttons.editProvider;
        renderStatus(keyStatus, 'warning', currentPack.statuses.checkingStatus);
        languageStatus.textContent = '';
        apiKeyInput.placeholder = currentPack.placeholders.enterApiKey;
        renderProviderSelect();
        renderGenerateModeSelect();
        updateGenerateBtn();
        updateGenerateModeStatus(currentGenerateMode);
      }

      function applyLanguage(nextDisplayLanguage, nextEffectiveLanguage) {
        displayLanguage = nextDisplayLanguage;
        effectiveLanguage = nextEffectiveLanguage || 'en';
        currentPack = languagePacks[effectiveLanguage] || languagePacks.en;
        renderStaticText();
        renderLanguageOptions();
        updateProviderUI(currentProvider);
        updateCommitOutputOptionsUI(currentCommitOutputOptions);
      }


      function updateCommitOutputOptionsUI(options) {
        const normalized = normalizeCommitOutputOptions(options);
        currentCommitOutputOptions = normalized;
        includeScopeCheckbox.checked = normalized.includeScope;
        includeBodyCheckbox.checked = normalized.includeBody;
        includeFooterCheckbox.checked = normalized.includeFooter;
      }

      function saveCommitOutputOptions() {
        const options = {
          includeScope: includeScopeCheckbox.checked,
          includeBody: includeBodyCheckbox.checked,
          includeFooter: includeFooterCheckbox.checked,
        };
        updateCommitOutputOptionsUI(options);
        vscode.postMessage({ type: 'saveCommitOutputOptions', value: currentCommitOutputOptions });
      }

      function updateGenerateModeStatus(mode) {
        if (currentProvider === 'ollama') {
          generateModeStatus.textContent = currentPack.descriptions.ollamaFixedToDirectDiff;
          return;
        }
        if (mode === 'agentic') {
          generateModeStatus.textContent = currentPack.descriptions.agenticModeDescription;
        } else {
          generateModeStatus.textContent = currentPack.descriptions.directDiffDescription;
        }
      }

      function updateGenerateModeUI(provider) {
        if (provider === 'ollama') {
          currentGenerateMode = 'direct-diff';
          generateModeSelect.value = 'direct-diff';
          generateModeSelect.disabled = true;
          updateGenerateModeStatus('direct-diff');
          return;
        }

        const mode = normalizeGenerateMode(preferredGenerateMode || defaultGenerateMode);
        currentGenerateMode = mode;
        generateModeSelect.value = mode;
        generateModeSelect.disabled = false;
        updateGenerateModeStatus(mode);
      }

      function isCustomProvider(provider) {
        return typeof provider === 'string' && provider.startsWith(customProviderPrefix);
      }

      function getCustomProviderConfig(provider) {
        if (!isCustomProvider(provider)) { return null; }
        const id = provider.slice(customProviderPrefix.length);
        return (customProviders || []).find(function(cp) { return cp.id === id; }) || null;
      }

      function updateProviderUI(provider) {
        currentProvider = provider;
        providerSelect.value = provider;
        if (provider === 'ollama') {
          editProviderBtn.classList.add('hidden');
          apiKeyLabel.textContent = currentPack.labels.ollamaHostUrl;
          apiKeyInput.placeholder = ollamaDefaultHost;
          apiKeyInput.value = normalizeOllamaHostValue(ollamaStoredHost);
          apiKeyInput.type = 'text';
          configTitle.textContent = currentPack.sections.ollamaConfiguration;
          providerInfo.innerHTML = fillTemplate(currentPack.descriptions.ollamaInfo, { host: ollamaDefaultHost });
        } else if (isCustomProvider(provider)) {
          const cp = getCustomProviderConfig(provider);
          editProviderBtn.classList.toggle('hidden', !cp);
          apiKeyLabel.textContent = currentPack.labels.apiKey;
          apiKeyInput.value = '';
          apiKeyInput.type = 'password';
          configTitle.textContent = currentPack.sections.configuration;
          apiKeyInput.placeholder = currentPack.placeholders.enterCustomApiKey;
          providerInfo.innerHTML = renderCustomProviderInfo(cp);
        } else {
          editProviderBtn.classList.add('hidden');
          apiKeyLabel.textContent = currentPack.labels.apiKey;
          apiKeyInput.value = '';
          apiKeyInput.type = 'password';
          configTitle.textContent = currentPack.sections.configuration;
          if (provider === 'google') {
            apiKeyInput.placeholder = currentPack.placeholders.enterGeminiApiKey;
            providerInfo.innerHTML = currentPack.descriptions.googleInfo;
          } else if (provider === 'openai') {
            apiKeyInput.placeholder = currentPack.placeholders.enterOpenAIApiKey;
            providerInfo.innerHTML = currentPack.descriptions.openaiInfo;
          } else if (provider === 'anthropic') {
            apiKeyInput.placeholder = currentPack.placeholders.enterAnthropicApiKey;
            providerInfo.innerHTML = currentPack.descriptions.anthropicInfo;
          } else {
            apiKeyInput.placeholder = currentPack.placeholders.enterApiKey;
            providerInfo.innerHTML = '';
          }
        }
        updateGenerateModeUI(provider);
        resetModelUIForLoading();
        if (typeof providerKeyStatuses[provider] === 'boolean') {
          updateKeyStatus(providerKeyStatuses[provider], provider);
        }
        vscode.postMessage({ type: 'checkKey', provider });
        vscode.postMessage({ type: 'getModels', provider });
      }

      function updateGenerateBtn() {
        if (isGenerating) {
          generateBtn.disabled = false;
          generateBtn.textContent = currentPack.buttons.cancelGenerating;
          generateBtn.title = currentPack.statuses.cancelCurrentGeneration;
        } else if (pendingStatusCheck || !hasChanges) {
          generateBtn.disabled = true;
          generateBtn.textContent = currentPack.buttons.generateCommitMessage;
          generateBtn.title = pendingStatusCheck ? '' : currentPack.statuses.noChangesDetected;
        } else {
          generateBtn.disabled = false;
          generateBtn.textContent = currentPack.buttons.generateCommitMessage;
          generateBtn.title = '';
        }
      }

      function updateKeyStatus(hasKey, provider) {
        providerKeyStatuses[provider] = !!hasKey;
        if (provider !== currentProvider) {
          return;
        }
        if (hasKey) {
          renderStatus(keyStatus, 'success', currentPack.statuses.configured);
          modelSelect.disabled = false;
        } else {
          renderStatus(keyStatus, 'error', currentPack.statuses.notConfigured);
          if (provider !== 'ollama') {
            modelSelect.disabled = true;
          }
        }
      }

      function setScreen(screen, notifyExtension) {
        mainView.classList.toggle('hidden', screen !== 'main');
        settingsView.classList.toggle('hidden', screen !== 'settings');
        addProviderView.classList.toggle('hidden', screen !== 'addProvider');
        if (notifyExtension) {
          vscode.postMessage({ type: 'setCurrentScreen', value: screen });
        }
      }

      function removeCustomModelInput() {
        const existingInput = document.getElementById('customModelInput');
        if (existingInput) { existingInput.remove(); }
      }

      function resetModelUIForLoading() {
        currentAllowCustomModel = false;
        removeCustomModelInput();
        modelSelect.classList.remove('hidden');
        modelSelect.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.disabled = true;
        placeholder.selected = true;
        placeholder.textContent = currentPack.placeholders.selectModel;
        modelSelect.appendChild(placeholder);
        modelSelect.disabled = true;
      }

      function populateModels(models, currentModel, allowCustomModel, provider) {
        const modelGroup = modelSelect.parentElement;
        const activeProvider = provider || currentProvider;
        currentAllowCustomModel = !!allowCustomModel;
        removeCustomModelInput();

        if (allowCustomModel) {
          modelSelect.classList.add('hidden');
          const input = document.createElement('input');
          input.type = 'text';
          input.id = 'customModelInput';
          input.value = currentModel || '';
          input.addEventListener('change', () => {
            vscode.postMessage({ type: 'saveModel', value: input.value.trim(), provider: activeProvider });
          });
          modelGroup.appendChild(input);
          return;
        }

        modelSelect.classList.remove('hidden');
        modelSelect.innerHTML = '';
        let foundCurrent = false;
        models.forEach(model => {
          const option = document.createElement('option');
          option.value = model.id;
          option.textContent = model.alias;
          if (model.id === currentModel) {
            option.selected = true;
            foundCurrent = true;
          }
          modelSelect.appendChild(option);
        });
        modelSelect.disabled = false;
        if (!foundCurrent && models.length > 0) {
          const preferredDefaultId = defaultModels[activeProvider];
          const preferred = models.find(m => m.id === preferredDefaultId) || models[0];
          modelSelect.value = preferred.id;
          vscode.postMessage({ type: 'saveModel', value: preferred.id, provider: activeProvider });
        }
      }

      applyLanguage(displayLanguage, effectiveLanguage);
      updateCommitOutputOptionsUI(defaultCommitOutputOptions);
      setScreen(
        initialScreen === 'settings' ? 'settings' : 'main',
        true,
      );

      vscode.postMessage({ type: 'getProvider' });
      vscode.postMessage({ type: 'getCustomProviders' });
      vscode.postMessage({ type: 'getGenerateMode' });
      vscode.postMessage({ type: 'getCommitOutputOptions' });
      vscode.postMessage({ type: 'getMaxAgentSteps' });
      vscode.postMessage({ type: 'checkGit' });
      vscode.postMessage({ type: 'getAllKeys' });
      vscode.postMessage({ type: 'checkGenerationStatus' });
      vscode.postMessage({ type: 'checkValidationStatus' });
      vscode.postMessage({ type: 'getDisplayLanguage' });

      providerSelect.addEventListener('change', () => {
        const provider = providerSelect.value;
        if (provider === '__add_provider__') {
          providerSelect.value = currentProvider;
          openAddProviderView(null);
          return;
        }
        updateProviderUI(provider);
        vscode.postMessage({ type: 'saveProvider', value: provider });
        saveBtn.disabled = provider !== 'ollama';
      });

      apiKeyInput.addEventListener('input', () => {
        if (currentProvider === 'ollama') {
          ollamaStoredHost = apiKeyInput.value;
          saveBtn.disabled = false;
        } else {
          saveBtn.disabled = !apiKeyInput.value.trim();
        }
      });

      saveBtn.addEventListener('click', () => {
        const key = apiKeyInput.value || (currentProvider === 'ollama' ? ollamaDefaultHost : '');
        if (currentProvider === 'ollama') {
          ollamaStoredHost = normalizeOllamaHostValue(key);
        }
        saveBtn.disabled = true;
        saveBtn.textContent = currentPack.buttons.validating;
        renderStatus(keyStatus, 'warning', currentPack.statuses.validating);
        vscode.postMessage({ type: 'saveKey', value: key, provider: currentProvider });
      });

      editProviderBtn.addEventListener('click', () => {
        if (!isCustomProvider(currentProvider)) {
          return;
        }
        const cp = getCustomProviderConfig(currentProvider);
        if (!cp) {
          return;
        }
        openAddProviderView(cp.id);
      });

      generateBtn.addEventListener('click', () => {
        if (isGenerating) {
          vscode.postMessage({ type: 'cancelGenerate' });
          return;
        }
        if (currentAllowCustomModel) {
          const customModelInput = document.getElementById('customModelInput');
          if (!customModelInput || !customModelInput.value.trim()) {
            vscode.postMessage({ type: 'showWarning', message: currentPack.statuses.modelNameRequired });
            return;
          }
        }
        isGenerating = true;
        updateGenerateBtn();
        vscode.postMessage({
          type: 'generate',
          generateMode: currentGenerateMode,
          commitOutputOptions: currentCommitOutputOptions,
        });
      });

      modelSelect.addEventListener('change', () => {
        vscode.postMessage({ type: 'saveModel', value: modelSelect.value, provider: currentProvider });
      });

      generateModeSelect.addEventListener('change', () => {
        if (currentProvider === 'ollama') {
          return;
        }
        const mode = normalizeGenerateMode(generateModeSelect.value);
        preferredGenerateMode = mode;
        currentGenerateMode = mode;
        updateGenerateModeStatus(mode);
        vscode.postMessage({ type: 'saveGenerateMode', value: mode });
      });

      includeScopeCheckbox.addEventListener('change', saveCommitOutputOptions);
      includeBodyCheckbox.addEventListener('change', saveCommitOutputOptions);
      includeFooterCheckbox.addEventListener('change', saveCommitOutputOptions);

      languageSelect.addEventListener('change', () => {
        const nextDisplayLanguage = languageSelect.value;
        renderStatus(languageStatus, 'warning', currentPack.statuses.loadingConfiguration);
        vscode.postMessage({ type: 'saveDisplayLanguage', value: nextDisplayLanguage });
      });

      maxAgentStepsInput.addEventListener('input', () => {
        updateMaxAgentStepsSaveBtn();
      });

      saveMaxAgentStepsBtn.addEventListener('click', () => {
        const value = normalizeMaxAgentStepsValue(maxAgentStepsInput.value);
        maxAgentStepsInput.value = value > 0 ? String(value) : '';
        currentMaxAgentSteps = value;
        updateMaxAgentStepsSaveBtn();
        vscode.postMessage({ type: 'saveMaxAgentSteps', value });
      });

      backBtn.addEventListener('click', () => {
        setScreen('main', true);
      });

      function openAddProviderView(existingId) {
        editingCustomProviderId = existingId;
        editingOriginalName = '';
        editingOriginalBaseUrl = '';
        providerNameInput.value = '';
        apiBaseUrlInput.value = '';
        customApiKeyInput.value = '';
        addProviderStatus.innerHTML = '';
        deleteProviderBtn.classList.add('hidden');

        if (existingId) {
          const cp = (customProviders || []).find(function(c) { return c.id === existingId; });
          if (cp) {
            providerNameInput.value = cp.name;
            apiBaseUrlInput.value = cp.baseUrl;
            editingOriginalName = cp.name;
            editingOriginalBaseUrl = cp.baseUrl;
            deleteProviderBtn.classList.remove('hidden');
          }
        }
        renderAddProviderStaticText();
        updateSaveProviderBtn();
        setScreen('addProvider', true);
      }

      function renderAddProviderStaticText() {
        const isEditing = !!editingCustomProviderId;
        addProviderSectionTitle.textContent = isEditing
          ? currentPack.sections.editProvider
          : currentPack.sections.addProvider;
        addProviderInfo.innerHTML = currentPack.descriptions.customProviderInfo;
        providerNameLabel.textContent = currentPack.labels.providerName;
        providerNameInput.placeholder = '';
        apiBaseUrlLabel.textContent = currentPack.labels.apiBaseUrl;
        apiBaseUrlInput.placeholder = '';
        const customApiKeyGroup = document.getElementById('customApiKeyGroup');
        if (customApiKeyGroup) {
          customApiKeyGroup.style.display = isEditing ? 'none' : '';
        }
        customApiKeyLabel.textContent = currentPack.labels.apiKey;
        customApiKeyInput.placeholder = '';
        saveProviderBtn.textContent = currentPack.buttons.save;
        deleteProviderBtn.textContent = currentPack.buttons.deleteProvider;
        addProviderBackBtn.title = currentPack.buttons.back;
      }

      function updateSaveProviderBtn() {
        const name = providerNameInput.value.trim();
        const url = apiBaseUrlInput.value.trim();
        const hasName = !!name;
        const hasUrl = !!url;
        const hasKey = !!customApiKeyInput.value.trim() || !!editingCustomProviderId;
        const hasChanges = !editingCustomProviderId
          || name !== editingOriginalName
          || url !== editingOriginalBaseUrl;
        saveProviderBtn.disabled = !(hasName && hasUrl && hasKey && hasChanges);
      }

      providerNameInput.addEventListener('input', updateSaveProviderBtn);
      apiBaseUrlInput.addEventListener('input', updateSaveProviderBtn);
      customApiKeyInput.addEventListener('input', updateSaveProviderBtn);

      addProviderBackBtn.addEventListener('click', () => {
        setScreen('main', true);
      });

      saveProviderBtn.addEventListener('click', () => {
        const name = providerNameInput.value.trim();
        const baseUrl = apiBaseUrlInput.value.trim();
        const apiKey = customApiKeyInput.value.trim();

        if (!name) {
          renderStatus(addProviderStatus, 'error', currentPack.statuses.providerNameRequired);
          return;
        }
        if (!baseUrl) {
          renderStatus(addProviderStatus, 'error', currentPack.statuses.baseUrlRequired);
          return;
        }

        const allNames = Object.values(providers).map(function(n) { return n.toLowerCase(); });
        (customProviders || []).forEach(function(cp) {
          if (cp.id !== editingCustomProviderId) {
            allNames.push(cp.name.toLowerCase());
          }
        });
        if (allNames.indexOf(name.toLowerCase()) !== -1) {
          renderStatus(addProviderStatus, 'error', currentPack.statuses.providerNameConflict);
          return;
        }

        saveProviderBtn.disabled = true;
        saveProviderBtn.textContent = currentPack.buttons.validating;
        renderStatus(addProviderStatus, 'warning', currentPack.statuses.validating);
        vscode.postMessage({
          type: 'saveCustomProvider',
          name: name,
          baseUrl: baseUrl,
          apiKey: apiKey || '',
          editId: editingCustomProviderId || null,
        });
      });

      deleteProviderBtn.addEventListener('click', () => {
        if (editingCustomProviderId) {
          vscode.postMessage({ type: 'deleteCustomProvider', id: editingCustomProviderId });
        }
      });

      window.addEventListener('message', event => {
        const message = event.data;
        switch (message.type) {
          case 'currentProvider':
            updateProviderUI(message.provider);
            break;
          case 'repoUpdate':
            hasChanges = message.hasChanges;
            updateGenerateBtn();
            break;
          case 'keyStatus':
            if (
              message.provider === 'ollama' &&
              currentProvider === 'ollama' &&
              typeof message.value === 'string'
            ) {
              ollamaStoredHost = normalizeOllamaHostValue(message.value);
              apiKeyInput.value = ollamaStoredHost;
            }
            updateKeyStatus(message.hasKey, message.provider);
            break;
          case 'allKeyStatuses': {
            const statuses = message.statuses && typeof message.statuses === 'object'
              ? message.statuses
              : {};
            providerKeyStatuses = {};
            Object.keys(statuses).forEach((provider) => {
              providerKeyStatuses[provider] = !!statuses[provider];
            });
            if (typeof providerKeyStatuses[currentProvider] === 'boolean') {
              updateKeyStatus(providerKeyStatuses[currentProvider], currentProvider);
            }
            break;
          }
          case 'currentGenerateMode':
            preferredGenerateMode = normalizeGenerateMode(message.generateMode);
            updateGenerateModeUI(currentProvider);
            break;
          case 'currentCommitOutputOptions':
            updateCommitOutputOptionsUI(message.commitOutputOptions);
            break;
          case 'modelsList':
            if (message.provider && message.provider !== currentProvider) {
              break;
            }
            populateModels(
              message.models,
              message.currentModel,
              message.allowCustomModel,
              message.provider || currentProvider,
            );
            break;
          case 'validating':
            if (message.provider && message.provider !== currentProvider) {
              break;
            }
            saveBtn.disabled = true;
            saveBtn.textContent = currentPack.buttons.validating;
            renderStatus(keyStatus, 'warning', currentPack.statuses.validating);
            break;
          case 'validationResult':
            if (message.provider && message.provider !== currentProvider) {
              break;
            }
            if (message.success) {
              renderStatus(keyStatus, 'success', currentPack.statuses.configured);
              if (currentProvider !== 'ollama') {
                apiKeyInput.value = '';
              }
              saveBtn.disabled = currentProvider !== 'ollama';
              saveBtn.textContent = currentPack.buttons.save;
              if (Array.isArray(message.models) || message.allowCustomModel) {
                populateModels(
                  message.models || [],
                  message.currentModel,
                  !!message.allowCustomModel,
                  message.provider || currentProvider,
                );
              }
              modelSelect.disabled = false;
            } else {
              renderStatus(keyStatus, 'error', message.error || currentPack.statuses.notConfigured);
              saveBtn.disabled = currentProvider === 'ollama' ? false : !apiKeyInput.value.trim();
              saveBtn.textContent = currentPack.buttons.save;
            }
            break;
          case 'generationDone':
            isGenerating = false;
            updateGenerateBtn();
            break;
          case 'generationStatusUpdate':
            isGenerating = message.isGenerating;
            pendingStatusCheck = false;
            updateGenerateBtn();
            break;
          case 'validationStatusUpdate':
            if (message.isValidating && message.provider === currentProvider) {
              saveBtn.disabled = true;
              saveBtn.textContent = currentPack.buttons.validating;
              renderStatus(keyStatus, 'warning', currentPack.statuses.validating);
            }
            break;
          case 'displayLanguageUpdated':
            vscodeLanguage = typeof message.vscodeLanguage === 'string' ? message.vscodeLanguage : '';
            applyLanguage(message.displayLanguage, message.effectiveLanguage);
            renderStatus(languageStatus, 'success', currentPack.statuses.languageSaved);
            break;
          case 'currentMaxAgentSteps':
            currentMaxAgentSteps = normalizeMaxAgentStepsValue(message.maxAgentSteps);
            maxAgentStepsInput.value = currentMaxAgentSteps > 0 ? String(currentMaxAgentSteps) : '';
            updateMaxAgentStepsSaveBtn();
            break;
          case 'openSettingsView':
            setScreen('settings', false);
            break;
          case 'customProviderSaved': {
            customProviders = message.customProviders || [];
            saveProviderBtn.textContent = currentPack.buttons.save;
            const savedKey = customProviderPrefix + message.savedId;
            renderProviderSelect();
            updateProviderUI(savedKey);
            vscode.postMessage({ type: 'saveProvider', value: savedKey });
            setScreen('main', true);
            break;
          }
          case 'customProviderDeleted': {
            customProviders = message.customProviders || [];
            saveProviderBtn.textContent = currentPack.buttons.save;
            renderProviderSelect();
            updateProviderUI(defaultProvider);
            vscode.postMessage({ type: 'saveProvider', value: defaultProvider });
            setScreen('main', true);
            break;
          }
          case 'customProviderSaveFailed':
            saveProviderBtn.textContent = currentPack.buttons.save;
            updateSaveProviderBtn();
            renderStatus(
              addProviderStatus,
              'error',
              message.error || currentPack.statuses.notConfigured,
            );
            break;
          case 'customProvidersLoaded':
            customProviders = message.customProviders || [];
            renderProviderSelect();
            if (isCustomProvider(currentProvider)) {
              updateProviderUI(currentProvider);
            }
            break;
          case 'openAddProviderView':
            openAddProviderView(message.editId || null);
            break;
        }
      });
    </script>
  </body>
</html>
